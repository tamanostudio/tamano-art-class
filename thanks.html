<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申し込みありがとうございます — TAMANO ART CLASS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', serif;
      background: #e8e5e0;
      color: #3a3530;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: #8fa89a;
      margin-bottom: 3rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #d4a5aa;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      stroke: white;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 300;
      margin-bottom: 1.2rem;
      color: #3a3530;
    }
    p {
      font-size: 0.9rem;
      color: #5a524a;
      line-height: 2;
      max-width: 480px;
      margin: 0 auto;
    }
    .divider {
      width: 36px;
      height: 1px;
      background: #d4a5aa;
      margin: 2rem auto;
    }
    .back-link {
      display: inline-block;
      margin-top: 2.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      color: #8fa89a;
      text-decoration: none;
      border-bottom: 1px solid #8fa89a;
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="logo">TAMANO ART CLASS</div>

  <div class="icon">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1>お申し込みありがとうございます</h1>

  <div class="divider"></div>

  <p>
    無料体験レッスンのお申し込みを受け付けました。<br>
    2〜3日以内にメールにてご連絡いたします。<br><br>
    届かない場合は迷惑メールフォルダをご確認いただくか、<br>
    LINEよりお気軽にお問い合わせください。
  </p>

  <a class="back-link" href="https://tamano-art-class.com/">トップページへ戻る →</a>
</body>
</html>
